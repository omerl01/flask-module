<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>

        <section class="form-section">
            <h3>Create New List</h3>
            <div class="input-group">
                <input type="text" id="listName" placeholder="Work, Groceries, etc.">
                <button onclick="createList()">Add List</button>
            </div>
        </section>

        <section class="form-section">
            <h3>Add Task</h3>
            <div class="input-group">
                <input type="text" id="taskTitle" placeholder="Task description">
                <select id="listSelect">
                    <option value="">No List</option>
                </select>
                <button onclick="createTask()">Add Task</button>
            </div>
        </section>

        <hr>

        <div id="display-area">
            <div class="column">
                <h2>Lists</h2>
                <ul id="lists-container"></ul>
            </div>
            <div class="column">
                <h2>Tasks</h2>
                <ul id="tasks-container"></ul>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalHeader">Edit Item</h3>
            <input type="hidden" id="editId">
            <input type="hidden" id="editCollection">
            
            <div class="input-group-vertical">
                <label>Name/Title:</label>
                <input type="text" id="editInput">
                
                <div id="listMoveSection" style="display:none;">
                    <label>Move to List:</label>
                    <select id="editListSelect"></select>
                </div>
            </div>

            <div class="modal-buttons">
                <button onclick="saveEdit()">Save Changes</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ""; 

        // --- FETCH & REFRESH ---
        async function fetchData(collection) {
            const res = await fetch(`${API_BASE}/all/${collection}`);
            const json = await res.json();
            return json.data || json;
        }

        // --- OPEN MODAL ---
        function openModal(id, collection, currentVal, currentListId = "") {
            document.getElementById('editId').value = id;
            document.getElementById('editCollection').value = collection;
            document.getElementById('editInput').value = currentVal;
            
            const moveSection = document.getElementById('listMoveSection');
            if (collection === 'todo') {
                moveSection.style.display = 'block';
                // Clone the main list dropdown for the modal
                const mainSelect = document.getElementById('listSelect');
                const modalSelect = document.getElementById('editListSelect');
                modalSelect.innerHTML = mainSelect.innerHTML;
                modalSelect.value = currentListId;
            } else {
                moveSection.style.display = 'none';
            }

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // --- SAVE EDIT ---
        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const collection = document.getElementById('editCollection').value;
            const newVal = document.getElementById('editInput').value;

            let payload = {};
            if (collection === 'list') {
                payload = { name: newVal };
            } else {
                const newListId = document.getElementById('editListSelect').value;
                payload = { title: newVal, list: newListId };
            }

            await fetch(`${API_BASE}/item/${id}/${collection}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            closeModal();
            refresh();
        }

        // --- DELETE, TOGGLE, CREATE (Standard) ---
        async function deleteItem(id, collection) {
            if (!confirm("Delete?")) return;
            await fetch(`${API_BASE}/item/${id}/${collection}`, { method: 'DELETE' });
            refresh();
        }

        async function toggleTask(id, currentStatus) {
            await fetch(`${API_BASE}/item/${id}/todo`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ completed: !currentStatus })
            });
            refresh();
        }

        async function createList() {
            const name = document.getElementById('listName').value;
            await fetch(`${API_BASE}/all/list`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            refresh();
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const listId = document.getElementById('listSelect').value;
            await fetch(`${API_BASE}/all/todo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, list: listId })
            });
            refresh();
        }

        async function refresh() {
            const lists = await fetchData('list');
            const tasks = await fetchData('todo');

            // Dropdown
            const select = document.getElementById('listSelect');
            select.innerHTML = '<option value="">No List</option>';
            lists.forEach(l => select.innerHTML += `<option value="${l._id}">${l.name}</option>`);

            // Lists
            const listUl = document.getElementById('lists-container');
            listUl.innerHTML = '';
            lists.forEach(l => {
                listUl.innerHTML += `<li>
                    <span>${l.name}</span>
                    <div class="btn-group">
                        <button onclick="openModal('${l._id}', 'list', '${l.name}')">✎</button>
                        <button onclick="deleteItem('${l._id}', 'list')">×</button>
                    </div>
                </li>`;
            });

            // Tasks
            const taskUl = document.getElementById('tasks-container');
            taskUl.innerHTML = '';
            tasks.forEach(t => {
                const listName = lists.find(l => l._id === t.list)?.name || 'General';
                taskUl.innerHTML += `
                    <li class="${t.completed ? 'completed' : ''}">
                        <div class="task-info">
                            <input type="checkbox" ${t.completed ? 'checked' : ''} 
                                   onclick="toggleTask('${t._id}', ${t.completed})">
                            <strong>${t.title}</strong>
                            <br><small>List: ${listName}</small>
                        </div>
                        <div class="btn-group">
                            <button onclick="openModal('${t._id}', 'todo', '${t.title}', '${t.list}')">✎</button>
                            <button onclick="deleteItem('${t._id}', 'todo')">×</button>
                        </div>
                    </li>`;
            });
        }
        refresh();
    </script>
</body>
</html>
